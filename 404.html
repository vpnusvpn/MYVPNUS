  <script>
  (function () {
    const container = document.getElementById('bgCanvas');
    const canvas = document.createElement('canvas');
    container.appendChild(canvas);
    const gl = canvas.getContext('webgl2', { alpha: false, antialias: false });
    if (!gl) return;

    const vertSrc = `#version 300 es
  in vec2 position;
  void main() { gl_Position = vec4(position, 0.0, 1.0); }`;

    const fragSrc = `#version 300 es
  precision highp float;
  uniform vec2 iResolution;
  uniform float iTime;
  out vec4 fragColor;
  #define S(a,b,t) smoothstep(a,b,t)
  mat2 Rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
  vec2 hash(vec2 p){p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));return fract(sin(p)*43758.5453);}
  float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float n=mix(mix(dot(-1.0+2.0*hash(i),f),dot(-1.0+2.0*hash(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(-1.0+2.0*hash(i+vec2(0,1)),f-vec2(0,1)),dot(-1.0+2.0*hash(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);return 0.5+0.5*n;}
  void main(){
    vec3 uColor1=vec3(3.0/255.0,200.0/255.0,186.0/255.0);
    vec3 uColor2=vec3(2.0/255.0,51.0/255.0,48.0/255.0);
    vec3 uColor3=vec3(2.0/255.0,51.0/255.0,48.0/255.0);
    float t=iTime*0.4;
    vec2 uv=gl_FragCoord.xy/iResolution.xy;
    float ratio=iResolution.x/iResolution.y;
    vec2 tuv=uv-0.5;
    tuv/=0.9;
    float degree=noise(vec2(t*0.1,tuv.x*tuv.y)*2.0);
    tuv.y*=1.0/ratio;
    tuv*=Rot(radians((degree-0.5)*500.0+180.0));
    tuv.y*=ratio;
    float amplitude=50.0;
    float warpTime=t*2.0;
    tuv.x+=sin(tuv.y*5.0+warpTime)/amplitude;
    tuv.y+=sin(tuv.x*7.5+warpTime)/(amplitude*0.5);
    float s=0.05;
    mat2 blendRot=Rot(0.0);
    float blendX=(tuv*blendRot).x;
    vec3 layer1=mix(uColor3,uColor2,S(-0.3-s,0.2+s,blendX));
    vec3 layer2=mix(uColor2,uColor1,S(-0.3-s,0.2+s,blendX));
    vec3 col=mix(layer1,layer2,S(0.5+s,-0.3-s,tuv.y));
    vec2 grainUv=uv*2.0;
    float grain=fract(sin(dot(grainUv,vec2(12.9898,78.233)))*43758.5453);
    col+=(grain-0.5)*0.1;
    col=(col-0.5)*1.5+0.5;
    float luma=dot(col,vec3(0.2126,0.7152,0.0722));
    col=mix(vec3(luma),col,1.0);
    col=clamp(col,0.0,1.0);
    fragColor=vec4(col,1.0);
  }`;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
        return null;
      }
      return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    const posLoc = gl.getAttribLocation(prog, 'position');
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    const uRes = gl.getUniformLocation(prog, 'iResolution');
    const uTime = gl.getUniformLocation(prog, 'iTime');

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const t0 = performance.now();

    function frame(t) {
      const w = Math.round(window.innerWidth * dpr);
      const h = Math.round(window.innerHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, (t - t0) * 0.001);
      gl.bindVertexArray(vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
  </script>
